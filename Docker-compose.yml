version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: breast-cancer-api
    ports:
      - "8000:8000"
    networks:
      - app-network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: breast-cancer-streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/predict
    networks:
      - app-network
    depends_on:
      - api

networks:
  app-network:
    driver: bridge
    
